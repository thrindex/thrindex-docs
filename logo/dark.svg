<svg width="174" height="32" viewBox="0 0 174 32" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Cardinal spokes -->
  <line x1="14" y1="13.2" x2="14" y2="8.2"    stroke="#FAFAFA" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="16.8" y1="16" x2="21.8" y2="16"   stroke="#FAFAFA" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="14" y1="18.8" x2="14" y2="23.8"   stroke="#FAFAFA" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="11.2" y1="16" x2="6.2" y2="16"    stroke="#FAFAFA" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Diagonal spokes -->
  <line x1="16.0" y1="14.0" x2="20.0" y2="10.0" stroke="#FAFAFA" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16.0" y1="18.0" x2="20.0" y2="22.0" stroke="#FAFAFA" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="12.0" y1="18.0" x2="8.0"  y2="22.0" stroke="#FAFAFA" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="12.0" y1="14.0" x2="8.0"  y2="10.0" stroke="#FAFAFA" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Hub circle -->
  <circle cx="14" cy="16" r="2.8" stroke="#FAFAFA" stroke-width="1.8" fill="none"/>

  <!-- Cardinal outer nodes (larger) — all 10px from center -->
  <circle cx="14" cy="6"  r="2.2" stroke="#FAFAFA" stroke-width="1.6" fill="none"/>
  <circle cx="24" cy="16" r="2.2" stroke="#FAFAFA" stroke-width="1.6" fill="none"/>
  <circle cx="14" cy="26" r="2.2" stroke="#FAFAFA" stroke-width="1.6" fill="none"/>
  <circle cx="4"  cy="16" r="2.2" stroke="#FAFAFA" stroke-width="1.6" fill="none"/>

  <!-- Diagonal outer nodes (smaller) — all 10px from center -->
  <circle cx="21.1" cy="8.9"  r="1.5" stroke="#FAFAFA" stroke-width="1.4" fill="none"/>
  <circle cx="21.1" cy="23.1" r="1.5" stroke="#FAFAFA" stroke-width="1.4" fill="none"/>
  <circle cx="6.9"  cy="23.1" r="1.5" stroke="#FAFAFA" stroke-width="1.4" fill="none"/>
  <circle cx="6.9"  cy="8.9"  r="1.5" stroke="#FAFAFA" stroke-width="1.4" fill="none"/>

  <!-- Wordmark -->
  <text font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.025em">
    <tspan x="36" y="22" fill="#FAFAFA">Thrindex</tspan><tspan fill="#71717A" font-weight="500"> docs</tspan>
  </text>
</svg>
